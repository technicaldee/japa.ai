steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/japa-agent",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/japa-agent",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "japa-agent",
        "--image",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/japa-agent",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--memory",
        "512Mi",
        "--cpu",
        "1",
        "--min-instances",
        "0",
        "--max-instances",
        "3",
        "--concurrency",
        "80",
        "--timeout",
        "300",
        "--set-env-vars",
        "GEMINI_API_KEY=${_GEMINI_API_KEY},MONGO_URI=${_MONGO_URI}",
      ]

substitutions:
  _REGION: us-central1
  _GEMINI_API_KEY: your-gemini-api-key
  _MONGO_URI: your-mongo-uri

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 600s
