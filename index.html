<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Japa AI Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined.filled, .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .card-shadow { box-shadow: 0px 4px 20px rgba(16, 42, 67, 0.05); }
    .card-shadow-lg { box-shadow: 0px 12px 32px rgba(16, 42, 67, 0.12); }
    .ai-insight-border { position: relative; background: #ffffff; background-clip: padding-box; border: 2px solid transparent; border-radius: 0.75rem; }
    .ai-insight-border::before { content: ''; position: absolute; top: 0; right: 0; bottom: 0; left: 0; z-index: -1; margin: -2px; border-radius: inherit; background: linear-gradient(135deg, #00A3B1 0%, #102A43 100%); opacity: 0.2; }
    .bg-grid-pattern { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(206, 229, 255, 0.2) 1px, transparent 1px), linear-gradient(to bottom, rgba(206, 229, 255, 0.2) 1px, transparent 1px); }
    .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
